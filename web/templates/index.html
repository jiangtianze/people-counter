<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="60">
    <title>人数监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>

<body style="
    background-color:#121212;
    color:white;
    font-family:Arial,sans-serif;
">

    <h1 style="text-align:center;" >实验室人数监控</h1>

    <div style="
        display:flex;
        justify-content:center;
        gap:30px;
        margin:20px;
    ">

        <div style="
            background:#1f1f1f;
            border:1px solid #444;
            border-radius:10px; 
            padding:20px;
            width:180px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.5);
        ">
            <h3>当前人数</h3>
            <h1>{{ current_count }}</h1>
        </div>

        <div style="
            background:#1f1f1f;
            border:1px solid #444;
            border-radius:10px;
            padding:20px;
            width:180px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.5);
        ">
            <h3>最大人数</h3>
            <h1>{{ max_count }}</h1>
        </div>

        <div style="
            background:#1f1f1f;
            border:1px solid #444;
            border-radius:10px;
            padding:20px;
            width:180px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.5);
        ">
            <h3>平均人数</h3>
            <h1>{{ avg_count }}</h1>
        </div>

    </div>

    <h3>最新更新时间: {{ latest_time }}</h3>
    <h2>最新检测截图</h2>
    <div style="text-align:center;">
        <img
            src="/latest_image"
            width="800"
            style="
                border:2px solid #444;
                border-radius:10px;           
        " >

    <h2 style="text-align:center;">
        最近检测记录
    </h2>

    <table
        style="
            margin:auto;
            border-collapse:collapse;
            width:80%;
            background:#1f1f1f;
            color:white;       

 "
        border="1">

        <tr  style="background:#333;">
            <th>时间</th>
            <th>人数</th>
        </tr>

        {% for row in recent_records %}
        <tr>
            <td>{{ row.time }}</td>
            <td>{{ row.count }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <div
         id="chart"
         style="
            width:90%;
            height:500px;
            margin:auto;
            background:#1f1f1f;
            border-radius:10px;
            padding:10px;
        ">
    </div>

    <script>
        var chart = echarts.init(document.getElementById('chart'));

        var option = {

            backgroundColor:'#1f1f1f',

            title:{
                text:'人数变化趋势',
                textStyle:{
                    color:'#ffffff'
                }
            },

            tooltip:{},

            xAxis:{
                type:'category',
                data: {{ times|tojson }},
                axisLabel:{
                    color:'#ffffff'
                }
            },

            yAxis:{
                type:'value',
                axisLabel:{
                    color:'#ffffff'
                }
            },

            series:[
                {
                    name:'人数',
                    type:'line',
                    smooth:true,
                    data: {{ counts|tojson }}
                }
            ]
        };
        chart.setOption(option);
    </script>

</body>
</html>
